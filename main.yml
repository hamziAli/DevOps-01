name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # ── 1. Run backend tests ───────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest backend/test_app.py -v

  # ── 2. Build Docker images ─────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t log-monitor-backend ./backend

      - name: Build frontend image
        run: docker build -t log-monitor-frontend ./frontend

  # ── 3. Deploy to AWS EC2 ──────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/log-monitoring-dashboard

            # Pull latest code
            git pull origin main

            # Rebuild and restart all containers
            docker compose down
            docker compose up -d --build

            # Show running containers
            docker compose ps
